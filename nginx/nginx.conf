# nginx.conf — the load balancer in front of the stateless app replicas.
#
# Round-robin (nginx's default balancing) across the three app containers.
# Because the app servers hold no per-instance state (all shared state is in
# Postgres/Redis), any replica can serve any request, so plain round-robin is
# correct and needs no sticky sessions.

events {}

http {
    # Three explicit replicas (compose services app1/app2/app3). Listing them
    # individually — rather than relying on Docker DNS round-robin for a single
    # service name — avoids nginx's start-up DNS caching and guarantees real
    # round-robin across all three. round-robin is nginx's default policy.
    upstream app_servers {
        server app1:3000;
        server app2:3000;
        server app3:3000;
    }

    # Small access log format that includes which upstream replica served the
    # request — handy for demonstrating load balancing.
    log_format lb '$remote_addr -> $upstream_addr "$request" $status';
    access_log /var/log/nginx/access.log lb;

    server {
        listen 80;

        location / {
            proxy_pass http://app_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Surface the serving replica id (the app sets X-Instance-Id) so a
            # demo can watch requests fan out across replicas.
            add_header X-Upstream $upstream_addr;
        }
    }
}
